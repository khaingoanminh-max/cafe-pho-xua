<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cafe Phố Xưa</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f6f3ef;
}

header{
background:#4e342e;
color:white;
text-align:center;
padding:25px;
}

.hero{

height:350px;

background:url("https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1200") center/cover;

display:flex;

justify-content:center;

align-items:center;

color:white;

font-size:42px;

font-weight:bold;

text-shadow:2px 2px 10px black;

}

.menu{

padding:40px;

text-align:center;

}

.card{

display:inline-block;

width:250px;

background:white;

margin:15px;

padding:20px;

border-radius:15px;

box-shadow:0 0 10px rgba(0,0,0,.2);

}

.price{

font-size:28px;

color:#d84315;

font-weight:bold;

}

footer{

background:#4e342e;

color:white;

text-align:center;

padding:20px;

margin-top:40px;

}

button{

background:#6d4c41;

color:white;

padding:15px 30px;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#3e2723;

}

</style>

</head>

<body>

<header>

<h1>☕ Cafe Phố Xưa</h1>

<p>Không gian xưa - Cà phê thật</p>

</header>

<div class="hero">

Cafe Phố Xưa

</div>

<section class="menu">

<h2>Menu hôm nay</h2>

<div class="card">

<h3>Cafe đen đá</h3>

<div class="price">15.000đ</div>

</div>

<div class="card">

<h3>Cafe sữa đá</h3>

<div class="price">20.000đ</div>

</div>

<br><br>

<button>Đặt đồ uống</button>

</section>

<footer>

Địa chỉ: Số 87 Quốc lộ 1A - Hộ Phòng - Bạc Liêu

<br><br>

Điện thoại: 0917856899

</footer>

</html>
